<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美悦子シリーズ ポータル</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            color: #fff; 
            margin: 0; 
            padding: 8px 10px; 
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.02) 75%, rgba(255, 255, 255, 0.02) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.02) 75%, rgba(255, 255, 255, 0.02) 76%, transparent 77%, transparent),
                url('https://picsum.photos/1920/1080?random=1'); 
            background-size: 30px 30px, 30px 30px, cover;
            background-position: center, center, center;
            background-repeat: repeat, repeat, no-repeat;
            background-attachment: fixed;
            height: 100vh; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            transition: background 0.4s ease-in-out;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.9), 0 0 4px rgba(0, 0, 0, 0.8);
        }

        /* 双指触发隐去所有文字和UI的核心控制样式 */
        body.hide-ui h1, 
        body.hide-ui .nav-bar, 
        body.hide-ui .content-area, 
        body.hide-ui .bg-config-panel {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.3s ease;
        }

        h1 { 
            color: #fff; 
            font-size: 1.2rem; 
            margin: 0 0 8px 0; 
            text-align: center; 
            border-bottom: 2px solid rgba(255, 255, 255, 0.2); 
            padding-bottom: 4px; 
            flex-shrink: 0;
            letter-spacing: 1px;
            cursor: pointer; 
            transition: opacity 0.3s ease;
        }

        /* 配置面板样式 */
        .bg-config-panel {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(3px);
            animation: fadeIn 0.3s ease-in-out;
            transition: opacity 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .config-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .config-row input, .config-row select {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 4px 8px;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
            text-shadow: none;
            min-width: 0; 
        }
        
        .config-row select option {
            background: #222;
            color: #fff;
        }

        .config-row input::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        .config-row button {
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-shadow: none;
            white-space: nowrap;
        }
        
        .config-row button:hover { background: rgba(255, 255, 255, 0.2); }
        .config-row button.btn-danger:hover { background: rgba(255, 50, 50, 0.5); border-color: rgba(255, 100, 100, 0.8); }

        .nav-bar { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 8px; 
            flex-shrink: 0; 
            justify-content: center; 
            transition: opacity 0.3s ease;
        }
        .nav-link { 
            padding: 5px 12px; 
            background: rgba(0, 0, 0, 0.2); 
            color: #fff; 
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .content-area { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            overflow-y: auto; 
            padding-bottom: 2px;
            transition: opacity 0.3s ease;
        }

        .series-section { 
            background: transparent; 
            padding: 4px 6px; 
            border-radius: 6px; 
            border: none; 
        }

        h2 { 
            color: #fff; 
            font-size: 0.9rem; 
            margin: 0 0 4px 0; 
            border-left: 3px solid #fff; 
            padding-left: 6px; 
            background: transparent; 
        }

        .links-grid { display: flex; flex-wrap: wrap; gap: 6px; }

        .link { 
            display: inline-block; 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.85rem; 
            padding: 4px 8px; 
            border-radius: 4px; 
            background-color: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.1s; 
        }

        .link.targeting { background-color: rgba(255, 255, 255, 0.3); color: #fff; border: 1px solid #fff; }
        .link.locked { background-color: #ffde00; color: #000; border: 1px solid #fff; font-weight: 900; text-shadow: none; }

        .cyber-panel { 
            background-color: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 6px; 
            padding: 6px 10px; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        #actionBtn { 
            background: rgba(0, 0, 0, 0.3); 
            color: #fff; 
            border: 1px solid #fff; 
            padding: 6px 18px; 
            font-size: 1.2rem; 
            font-family: 'Courier New', monospace; 
            font-weight: 900; 
            border-radius: 4px; 
            cursor: pointer; 
            text-shadow: none;
        }
        #actionBtn:active { transform: scale(0.95); }
        #actionBtn.running { background: rgba(255, 0, 0, 0.3); border-color: #ff0000; }

        #numberDisplay { 
            font-size: 2.2rem; 
            font-family: 'Courier New', monospace; 
            font-weight: 900; 
            letter-spacing: 5px; 
            color: #fff; 
            margin-left: 10px; 
        }
    </style>
</head>
<body>
    <h1 id="mainTitle" ondblclick="toggleConfigPanel()">美悦子シリーズ ポータル</h1>

    <div class="bg-config-panel" id="configPanel">
        <div class="config-row">
            <select id="bgSelect" onchange="changeSelectedWallpaper()"></select>
            <button class="btn-danger" onclick="deleteWallpaper()">删除当前</button>
        </div>
        <div class="config-row">
            <input type="text" id="bgNameInput" placeholder="名称 (如: 星空)" style="flex: 0.4;">
            <input type="text" id="bgUrlInput" placeholder="在此粘贴图片直链" style="flex: 0.6;">
            <button onclick="addWallpaper()">添加</button>
        </div>
        <div class="config-row">
            <button onclick="exportWallpapers()" style="flex: 1;">导出配置</button>
            <button onclick="document.getElementById('importInput').click()" style="flex: 1;">导入配置</button>
            <input type="file" id="importInput" accept=".json" style="display: none;" onchange="importWallpapers(event)">
        </div>
    </div>

    <div class="nav-bar">
        <a class="nav-link" href="https://moodhappy.github.io/MiyetsukoSeries/">作品一覧</a>
        <a class="nav-link" href="https://moodhappy.github.io/MiyetsukoSeries/admin.html">管理后台</a>
    </div>

    <div class="content-area">
        <div class="series-section">
            <h2>新鲜玛特シリーズ</h2>
            <div class="links-grid">
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/FreshMart/FreshMartOrigin/新鲜玛特的疯狂宇宙起源篇_1782015960000.html">起源篇</a>
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/FreshMart/FreshMartOne/新鲜玛特的疯狂宇宙第一卷.html_1782015600000.html">第一巻</a>
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/FreshMart/FreshMartTwo/新鲜玛特的疯狂宇宙第二卷_1781934000000.html">第二巻</a>
            </div>
        </div>

        <div class="series-section">
            <h2>女王の法則シリーズ</h2>
            <div class="links-grid">
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/QueenRules/女王的法则_1782039780000.html">女王の法則</a>
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/Extras/Kenta/美悦子与健太_1782036900000.html">健太篇</a>
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/Extras/Shiraishi/美悦子与白石_1782036900000.html">白石篇</a>
            </div>
        </div>

        <div class="series-section">
            <h2>書籍シリーズ</h2>
            <div class="links-grid">
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/Books/Hundred/百年孤独目录_1782298920000.html">百年孤独</a>
                <a class="link" href="https://moodhappy.github.io/MiyetsukoSeries/Books/The%20Little%20Prince/小王子目录.html_1782364260000.html">小王子</a>
            </div>
        </div>

        <div class="series-section">
            <h2>自建新闻站</h2>
            <div class="links-grid">
                <a class="link" href="https://moodhappy.github.io/OneHundredYearsReading/docs/index.html">OneHundred Years Reading</a>
                <a class="link" href="https://moodhappy.github.io/Web-Notes-Matrix/docs/index.html">Web Matrix</a>
                <a class="link" href="https://moodhappy.github.io/bbc-news-archive/docs/index.html">BBC News Archive</a>
                <a class="link" href="https://moodhappy.github.io/YT-Street-Echoes/docs/index.html">YT Street Echoes</a>
                <a class="link" href="https://moodhappy.github.io/moodHappy.gitHub.io-nce/style/YouTubeChina24.html">China24</a>
                <a class="link" href="https://moodhappy.github.io/Echoes-of-History/docs/index.html">Echoes of History</a>
                <a class="link" href="https://moodhappy.github.io/Daily-Nexus/docs/index.html">Daily Nexus</a>
                <a class="link" href="https://moodhappy.github.io/DailyFiveWords/docs/index.html">Daily Five Words</a>
            </div>
        </div>

        <div class="series-section">
            <h2>工具箱</h2>
            <div class="links-grid">
                <a class="link" href="https://moodhappy.github.io/moodHappy.gitHub.io-nce/style/danmu.html?path=Notes%2Fdanmu%2FTool">工具箱</a>
            </div>
        </div>

        <div class="cyber-panel">
            <div id="numberDisplay">---</div>
            <button id="actionBtn">START</button>
        </div>
    </div>

    <script>
        function toggleConfigPanel() {
            const panel = document.getElementById('configPanel');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'flex';
            } else {
                panel.style.display = 'none';
            }
        }

        let touchStartPoints = [];

        window.addEventListener('touchstart', function(e) {
            touchStartPoints = e.touches;
        }, { passive: false });

        window.addEventListener('touchend', function(e) {
            if (touchStartPoints.length >= 2) {
                document.body.classList.toggle('hide-ui');
            }
            touchStartPoints = [];
        });

        function updateBackground(imgUrl) {
            document.body.style.backgroundImage = `
                linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.02) 75%, rgba(255, 255, 255, 0.02) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.02) 75%, rgba(255, 255, 255, 0.02) 76%, transparent 77%, transparent),
                url('${imgUrl}')
            `;
        }

        let wallpapers = []; // 纯粹只放用户自己的链接
        let selectionMode = 'user_random'; 

        function initWallpaperManager() {
            const savedData = localStorage.getItem('miyetsuko_wallpapers_list');
            if (savedData) {
                try {
                    wallpapers = JSON.parse(savedData);
                    // 清理历史遗留在列表里的自带默认图数据，防止污染用户列表
                    wallpapers = wallpapers.filter(wp => !wp.url.includes("picsum.photos/1920/1080?random=101"));
                } catch (e) {
                    wallpapers = [];
                }
            }

            const savedMode = localStorage.getItem('miyetsuko_wallpaper_index');
            
            // 兼容以前的 random 模式
            if (savedMode === 'random' || savedMode === 'user_random') {
                selectionMode = 'user_random';
            } else if (savedMode === 'default_random') {
                selectionMode = 'default_random';
            } else {
                selectionMode = savedMode !== null ? savedMode : 'user_random';
            }

            renderSelect();
            applyCurrentWallpaper();
        }

        function renderSelect() {
            const select = document.getElementById('bgSelect');
            select.innerHTML = '';
            
            // 选项1：用户随机图（只在用户自己的列表里随机）
            const userRandomOpt = document.createElement('option');
            userRandomOpt.value = 'user_random';
            userRandomOpt.textContent = '用户随机图';
            select.appendChild(userRandomOpt);

            // 选项2：默认随机图（只抓取网络图）
            const defaultRandomOpt = document.createElement('option');
            defaultRandomOpt.value = 'default_random';
            defaultRandomOpt.textContent = '默认随机图';
            select.appendChild(defaultRandomOpt);

            // 剩下的全都是用户私人添加的图
            wallpapers.forEach((wp, index) => {
                const option = document.createElement('option');
                option.value = index.toString();
                option.textContent = wp.name;
                select.appendChild(option);
            });

            // 容错处理：如果记录的 index 找不到了，就跳回用户随机图
            let optionExists = Array.from(select.options).some(opt => opt.value === selectionMode);
            if (!optionExists) {
                selectionMode = 'user_random';
            }
            select.value = selectionMode;
        }

        function saveData() {
            localStorage.setItem('miyetsuko_wallpapers_list', JSON.stringify(wallpapers));
            localStorage.setItem('miyetsuko_wallpaper_index', selectionMode);
        }

        function applyCurrentWallpaper() {
            if (selectionMode === 'default_random') {
                // 网络图随机机制：打乱时间戳确保每次拿到不一样的 picsum 图
                updateBackground(`https://picsum.photos/1920/1080?random=${Date.now()}`);
            } else if (selectionMode === 'user_random') {
                // 用户链接随机机制
                if (wallpapers.length > 0) {
                    const displayIndex = Math.floor(Math.random() * wallpapers.length);
                    updateBackground(wallpapers[displayIndex].url);
                } else {
                    // 如果用户自己什么图都没加，做个优雅的降级
                    updateBackground(`https://picsum.photos/1920/1080?random=${Date.now()}`);
                }
            } else {
                // 指定某张用户图
                const idx = parseInt(selectionMode);
                if (!isNaN(idx) && idx >= 0 && idx < wallpapers.length) {
                    updateBackground(wallpapers[idx].url);
                }
            }
        }

        function changeSelectedWallpaper() {
            selectionMode = document.getElementById('bgSelect').value;
            saveData();
            applyCurrentWallpaper();
        }

        function addWallpaper() {
            const nameInput = document.getElementById('bgNameInput');
            const urlInput = document.getElementById('bgUrlInput');
            const url = urlInput.value.trim();
            let name = nameInput.value.trim();

            if (!url) {
                alert('请输入有效的图片链接！');
                return;
            }
            if (!name) {
                name = `壁纸 ${wallpapers.length + 1}`;
            }

            wallpapers.push({ name: name, url: url });
            
            // 添加新壁纸后，直接选中并显示这张新壁纸
            selectionMode = (wallpapers.length - 1).toString();
            
            saveData();
            renderSelect();
            applyCurrentWallpaper();
            
            nameInput.value = '';
            urlInput.value = '';
        }

        function deleteWallpaper() {
            if (selectionMode === 'user_random' || selectionMode === 'default_random') {
                alert('系统级选项无法删除！');
                return;
            }
            
            let displayIndex = parseInt(selectionMode);
            if (confirm(`确定要删除壁纸 "${wallpapers[displayIndex].name}" 吗？`)) {
                // 删除
                wallpapers.splice(displayIndex, 1);
                
                // 删除后自动跳回到“用户随机图”
                selectionMode = 'user_random';
                
                saveData();
                renderSelect();
                applyCurrentWallpaper();
            }
        }

        function exportWallpapers() {
            const dataStr = JSON.stringify(wallpapers, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "miyetsuko_wallpapers_backup.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importWallpapers(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    // 过滤掉以前旧的默认壁纸备份数据
                    const cleanImportedData = importedData.filter(wp => !wp.url.includes("picsum.photos/1920/1080?random=101"));
                    
                    if (Array.isArray(cleanImportedData) && cleanImportedData.length > 0 && cleanImportedData[0].url) {
                        wallpapers = wallpapers.concat(cleanImportedData);
                        
                        // 导入后跳转到刚导入的第一张壁纸
                        selectionMode = (wallpapers.length - cleanImportedData.length).toString();
                        
                        saveData();
                        renderSelect();
                        applyCurrentWallpaper();
                        alert('导入成功！');
                    } else {
                        alert('JSON 格式不正确，或全为系统默认图，无有效数据导入。');
                    }
                } catch (err) {
                    alert('文件读取或解析失败。请确保是有效的 JSON 文件。');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        initWallpaperManager();

        const btn = document.getElementById('actionBtn');
        const display = document.getElementById('numberDisplay');
        const links = document.querySelectorAll('.link');
        let isRunning = false, shuffleInterval = null;

        btn.addEventListener('click', function() {
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "STOP";
                btn.classList.add('running');
                shuffleInterval = setInterval(() => {
                    links.forEach(l => l.classList.remove('targeting', 'locked'));
                    links[Math.floor(Math.random() * links.length)].classList.add('targeting');
                    display.innerText = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                }, 40);
            } else {
                isRunning = false;
                clearInterval(shuffleInterval);
                btn.innerText = "START";
                btn.classList.remove('running');
                links.forEach(l => l.classList.remove('targeting'));
                const finalLink = links[Math.floor(Math.random() * links.length)];
                finalLink.classList.add('locked');

                const finalNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                const digits = Array.from(finalNum).map(Number);
                const minVal = Math.min(...digits);
                const redIdx = digits.indexOf(minVal); 

                display.innerHTML = Array.from(finalNum).map((n, i) => 
                    `<span style="color:${i === redIdx ? '#ff5555' : '#fff'}">${n}</span>`).join('');
            }
        });
    </script>
</body>
</html>
