<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美悦子シリーズ ポータル</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            color: #1a365d; 
            margin: 0; 
            padding: 8px 10px; 
            /* 浅色科技网格背景 */
            background-color: #f0f4f8; 
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 168, 255, 0.08) 25%, rgba(0, 168, 255, 0.08) 26%, transparent 27%, transparent 74%, rgba(0, 168, 255, 0.08) 75%, rgba(0, 168, 255, 0.08) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(0, 168, 255, 0.08) 25%, rgba(0, 168, 255, 0.08) 26%, transparent 27%, transparent 74%, rgba(0, 168, 255, 0.08) 75%, rgba(0, 168, 255, 0.08) 76%, transparent 77%, transparent); 
            background-size: 30px 30px;
            height: 100vh; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        h1 { 
            color: #0077b6; 
            font-size: 1.2rem; 
            margin: 0 0 8px 0; 
            text-align: center; 
            border-bottom: 2px solid rgba(0, 119, 182, 0.3); 
            padding-bottom: 4px; 
            flex-shrink: 0;
            text-shadow: 0 0 8px rgba(0, 119, 182, 0.2);
            letter-spacing: 1px;
        }

        /* 导航栏样式 */
        .nav-bar { display: flex; gap: 10px; margin-bottom: 8px; flex-shrink: 0; justify-content: center; }
        .nav-link { 
            padding: 5px 12px; 
            background: linear-gradient(135deg, #0077b6, #00b4d8); 
            color: #fff; 
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold; 
            box-shadow: 0 2px 4px rgba(0, 119, 182, 0.3);
            border: 1px solid #00b4d8;
        }

        .content-area { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; padding-bottom: 2px;}

        .series-section { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 6px 8px; 
            border-radius: 6px; 
            box-shadow: 0 2px 6px rgba(0, 119, 182, 0.08);
            border: 1px solid rgba(0, 180, 216, 0.3);
            backdrop-filter: blur(4px);
        }

        h2 { 
            color: #023e8a; 
            font-size: 0.9rem; 
            margin: 0 0 5px 0; 
            border-left: 3px solid #00b4d8; 
            padding-left: 6px; 
            background: linear-gradient(90deg, rgba(0, 180, 216, 0.15) 0%, transparent 100%); 
        }

        .links-grid { display: flex; flex-wrap: wrap; gap: 6px; }

        .link { 
            display: inline-block; 
            color: #0077b6; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.85rem; 
            padding: 4px 8px; 
            border-radius: 4px; 
            background-color: rgba(240, 248, 255, 0.8); 
            border: 1px solid #90e0ef; 
            transition: all 0.1s; 
        }

        /* 抽奖时的科技感样式 */
        .link.targeting { 
            background-color: #fff; 
            color: #00b4d8; 
            border: 1px dashed #00b4d8; 
            box-shadow: 0 0 6px rgba(0, 180, 216, 0.5); 
        }
        /* 锁定后的醒目样式，避免黑色 */
        .link.locked { 
            background-color: #ffde00; 
            color: #d90429; 
            border: 1px solid #d90429; 
            font-weight: 900; 
            box-shadow: 2px 2px 0 rgba(217, 4, 41, 0.8); 
        }

        /* 底部控制面板（亮色科技风） */
        .cyber-panel { 
            background-color: rgba(255, 255, 255, 0.9); 
            border: 2px solid #0077b6; 
            border-radius: 6px; 
            padding: 8px 10px; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 0 12px rgba(0, 119, 182, 0.2), inset 0 0 8px rgba(0, 180, 216, 0.1); 
        }

        #actionBtn { 
            background: rgba(0, 119, 182, 0.05); 
            color: #0077b6; 
            border: 2px solid #0077b6; 
            padding: 6px 18px; 
            font-size: 1.2rem; 
            font-family: 'Courier New', monospace; 
            font-weight: 900; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: 0 0 5px rgba(0, 119, 182, 0.2);
        }
        #actionBtn:active { transform: scale(0.95); }
        #actionBtn.running { 
            border-color: #ef233c; 
            color: #ef233c; 
            background: rgba(239, 35, 60, 0.05);
            box-shadow: 0 0 5px rgba(239, 35, 60, 0.3);
        }

        #numberDisplay { 
            font-size: 2.2rem; 
            font-family: 'Courier New', monospace; 
            font-weight: 900; 
            letter-spacing: 5px; 
            color: #0077b6; 
            text-shadow: 0 0 8px rgba(0, 180, 216, 0.4); 
            margin-left: 10px; 
        }
    </style>
</head>
<body>

        <div class="cyber-panel">
            <div id="numberDisplay">---</div>

    </div>

    <script>
        const btn = document.getElementById('actionBtn');
        const display = document.getElementById('numberDisplay');
        const links = document.querySelectorAll('.link');
        let isRunning = false, shuffleInterval = null;

        btn.addEventListener('click', function() {
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "STOP";
                btn.classList.add('running');
                shuffleInterval = setInterval(() => {
                    links.forEach(l => l.classList.remove('targeting', 'locked'));
                    links[Math.floor(Math.random() * links.length)].classList.add('targeting');
                    display.innerText = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                }, 40);
            } else {
                isRunning = false;
                clearInterval(shuffleInterval);
                btn.innerText = "START";
                btn.classList.remove('running');
                links.forEach(l => l.classList.remove('targeting'));
                const finalLink = links[Math.floor(Math.random() * links.length)];
                finalLink.classList.add('locked');

                const finalNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                const digits = Array.from(finalNum).map(Number);
                const minVal = Math.min(...digits);
                const redIdx = digits.indexOf(minVal); 

                /* 抽取出的高亮数字采用醒目红色，基础颜色采用科技蓝 */
                display.innerHTML = Array.from(finalNum).map((n, i) => 
                    `<span style="color:${i === redIdx ? '#ef233c' : '#0077b6'}">${n}</span>`).join('');
            }
        });
    </script>
