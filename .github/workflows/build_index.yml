name: Auto Build Story Index

# 只要你往 main 分支推了新文章，或者在网页上改了东西，立刻触发
on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许机器人帮你修改仓库里的 index.html

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Index Builder
        run: python build_index.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          # 如果 index.html 有变化，机器人会自动提交并推送到你的 GitHub Pages
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update index.html" && git push)
